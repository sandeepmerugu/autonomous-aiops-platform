groups:
  # ── SERVICE HEALTH ALERTS ──────────────────────────────────
  - name: service_health
    rules:

      - alert: HighHTTPErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m]) /
          rate(http_requests_total[5m]) > 0.10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate on {{ $labels.service }}"
          description: >
            Service {{ $labels.service }} has HTTP 5xx error rate of
            {{ $value | humanizePercentage }} — above 10% threshold.
            Check MongoDB connections and application logs.

      - alert: MongoDBConnectionErrors
        expr: rate(mongodb_connection_errors_total[2m]) > 0.5
        for: 30s
        labels:
          severity: critical
          service:  mongodb-simulator
        annotations:
          summary: "MongoDB connection errors spiking"
          description: >
            MongoDB connection errors at {{ $value }}/s in
            namespace {{ $labels.namespace }}.
            Node may be in maintenance or unreachable.
            This is the pattern seen in the Verizon node-maintenance incident.

      - alert: HighPodRestartRate
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Pod restarting frequently — {{ $labels.pod }}"
          description: >
            Pod {{ $labels.pod }} in {{ $labels.namespace }}
            has a restart rate of {{ $value }}/s.
            Possible OOMKill or crash-loop.

  # ── PERFORMANCE ALERTS ────────────────────────────────────
  - name: performance
    rules:

      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 2.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "p99 latency above 2s on {{ $labels.service }}"
          description: >
            p99 HTTP latency is {{ $value }}s on {{ $labels.service }}.
            Database connection issues often cause latency spikes.

  # ── AIOPS ENGINE ALERTS ───────────────────────────────────
  - name: aiops_engine
    rules:

      - alert: ClaudeAPIHighCost
        expr: increase(claude_api_cost_usd_total[1h]) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Claude API spend exceeding $1/hour"
          description: >
            AI engine has spent ${{ $value }} on Claude API calls
            in the last hour. Review if alert storm is causing
            excessive AI calls.

      - alert: AIEngineDown
        expr: up{job="aiops-engine"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AIOps engine is down — no automated RCA available"
          description: >
            The AI engine is not reachable. Incidents will require
            manual investigation until the engine is restored.
